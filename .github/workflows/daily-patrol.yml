name: Daily Property Patrol

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git user
        run: |
          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

      - name: Run daily patrol
        run: python run_daily_patrol.py
        timeout-minutes: 50

      - name: Commit and push data updates
        run: |
          git add data/ output/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-patrol: update data $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main || { echo "::error::git push failed — data will be lost"; exit 1; }
          else
            echo "No data changes to commit"
          fi

      # Gmail/LINE単体通知は廃止 — Daily Digestに統合済み (2026-03-07)
