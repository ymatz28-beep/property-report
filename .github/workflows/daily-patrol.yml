name: Daily Property Patrol

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: '1'

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      data_committed: ${{ steps.commit.outputs.data_committed }}
      patrol_failed: ${{ steps.patrol.outcome == 'failure' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git user
        run: |
          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

      - name: Run daily patrol
        id: patrol
        run: python run_daily_patrol.py
        timeout-minutes: 50
        # Partial results (some sites scraped) are better than none.
        # ConnectionResetError after 30+ min of scraping shouldn't discard earlier data.
        continue-on-error: true

      - name: Commit and push data updates to main
        id: commit
        if: always()
        run: |
          git add data/ output/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-patrol: update data $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main || { echo "::error::git push failed — data will be lost"; exit 1; }
            echo "data_committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit"
            echo "data_committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy reports to gh-pages
        if: always() && steps.commit.outputs.data_committed == 'true'
        run: |
          # Save output HTML before branch switch
          mkdir -p /tmp/deploy-reports
          for f in output/*.html; do
            fname=$(basename "$f")
            [ "$fname" = "portfolio_dashboard.html" ] && continue
            cp "$f" "/tmp/deploy-reports/$fname"
          done

          # Fetch and switch to gh-pages
          git fetch origin gh-pages:gh-pages
          git checkout gh-pages

          # Copy saved reports
          cp /tmp/deploy-reports/*.html ./

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy reports $(date +%Y-%m-%d)"
            git push origin gh-pages
            echo "✅ gh-pages deployed"
          else
            echo "No report changes to deploy"
          fi

      - name: Report patrol status
        if: steps.patrol.outcome == 'failure'
        run: |
          echo "::warning::Patrol completed with errors (partial results committed). Check logs for ConnectionResetError or timeout details."

      # Gmail/LINE単体通知は廃止 — Daily Digestに統合済み (2026-03-07)

  # Auto-retry: パトロール失敗+データcommitなし(完全失敗)の場合、30分後に再実行
  retry:
    needs: patrol
    if: always() && needs.patrol.outputs.patrol_failed == 'true' && needs.patrol.outputs.data_committed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes before retry
        run: sleep 1800

      - name: Trigger retry via workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run daily-patrol.yml --repo ${{ github.repository }}
