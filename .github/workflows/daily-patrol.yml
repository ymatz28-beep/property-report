name: Daily Property Patrol

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: '1'
  TZ: 'Asia/Tokyo'

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      data_committed: ${{ steps.commit.outputs.data_committed }}
      patrol_failed: ${{ steps.patrol.outcome == 'failure' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git user
        run: |
          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

      - name: Run daily patrol
        id: patrol
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python run_daily_patrol.py
        timeout-minutes: 50
        # Partial results (some sites scraped) are better than none.
        # ConnectionResetError after 30+ min of scraping shouldn't discard earlier data.
        continue-on-error: true

      - name: Commit and push data updates to main
        id: commit
        if: always()
        run: |
          git add data/ output/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-patrol: update data $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main || { echo "::error::git push failed — data will be lost"; exit 1; }
            echo "data_committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit"
            echo "data_committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy reports to gh-pages
        if: always() && steps.patrol.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect public HTML files (exclude confidential)
          mkdir -p /tmp/deploy-reports
          count=0
          for f in output/*.html; do
            [ ! -f "$f" ] && continue
            fname=$(basename "$f")
            [ "$fname" = "portfolio_dashboard.html" ] && continue
            cp "$f" "/tmp/deploy-reports/$fname"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          echo "Prepared $count HTML files for deploy"

          # Clone gh-pages into separate directory (avoids merge conflicts entirely)
          git clone --single-branch --branch gh-pages --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages-deploy
          cd /tmp/gh-pages-deploy

          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

          # Replace all HTML with fresh copies
          rm -f *.html
          cp /tmp/deploy-reports/*.html ./

          git add *.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy reports $(date +%Y-%m-%d)"
            git push origin gh-pages
            echo "gh-pages deployed successfully"
          else
            echo "No report changes to deploy"
          fi

      - name: Notify via Gmail
        if: always()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_ADDRESS: ${{ secrets.GMAIL_NOTIFY_ADDRESS }}
          PATROL_OUTCOME: ${{ steps.patrol.outcome }}
          DATA_COMMITTED: ${{ steps.commit.outputs.data_committed }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: https://ymatz28-beep.github.io/property-report/
        run: |
          python3 -c "
          import smtplib, json, os
          from email.mime.text import MIMEText
          from pathlib import Path

          outcome = os.environ['PATROL_OUTCOME']
          committed = os.environ.get('DATA_COMMITTED', 'false') == 'true'
          run_url = os.environ['RUN_URL']
          report_url = os.environ['REPORT_URL']

          # Read patrol_summary.json for granular failure info
          summary_path = Path('data/patrol_summary.json')
          failed_sources = []
          failed_steps = []
          total = 0
          new_count = 0
          if summary_path.exists():
              s = json.loads(summary_path.read_text())
              failed_sources = s.get('failed_sources', [])
              failed_steps = s.get('failed_steps', [])
              total = s.get('total', 0)
              new_count = s.get('new_count', 0)

          has_failures = bool(failed_sources or failed_steps)

          # Determine status — failures override 'success' outcome
          if not committed:
              icon, status = '\u274c', '\u5931\u6557'
          elif has_failures:
              icon, status = '\u26a0\ufe0f', '\u90e8\u5206\u5931\u6557'
          else:
              icon, status = '\u2705', '\u5b8c\u4e86'

          # Build body with specific failure details
          lines = []
          if has_failures:
              if failed_steps:
                  lines.append('\u25a0 \u5931\u6557\u30b9\u30c6\u30c3\u30d7: ' + ', '.join(failed_steps))
              if failed_sources:
                  lines.append('\u25a0 \u30bd\u30fc\u30b9\u969c\u5bb3: ' + ', '.join(failed_sources))
              lines.append('')

          if committed:
              lines.append(f'\u7dcf\u4ef6\u6570: {total}\u4ef6 / \u65b0\u898f: {new_count}\u4ef6')
              lines.append(report_url)
          else:
              lines.append('\u30c7\u30fc\u30bf\u66f4\u65b0\u306a\u3057\u300230\u5206\u5f8c\u306b\u81ea\u52d5\u30ea\u30c8\u30e9\u30a4\u4e88\u5b9a\u3002')

          if has_failures or not committed:
              lines.append(f'GHA\u30ed\u30b0: {run_url}')

          from datetime import datetime
          subject = f'{icon} \u7269\u4ef6\u30d1\u30c8\u30ed\u30fc\u30eb{status} {datetime.now().strftime(\"%m/%d\")}'
          body = '\n'.join(lines)

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['GMAIL_NOTIFY_ADDRESS']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              smtp.send_message(msg)
          print(f'Notification sent: {subject}')
          print(f'Body: {body}')
          "

  # Auto-retry: パトロール失敗+データcommitなし(完全失敗)の場合、30分後に再実行
  retry:
    needs: patrol
    if: always() && needs.patrol.outputs.patrol_failed == 'true' && needs.patrol.outputs.data_committed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes before retry
        run: sleep 1800

      - name: Trigger retry via workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run daily-patrol.yml --repo ${{ github.repository }}
