name: Daily Property Patrol

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: '1'
  TZ: 'Asia/Tokyo'

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      data_committed: ${{ steps.commit.outputs.data_committed }}
      patrol_failed: ${{ steps.patrol.outcome == 'failure' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git user
        run: |
          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

      - name: Run daily patrol
        id: patrol
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python run_daily_patrol.py
        timeout-minutes: 60
        # Partial results (some sites scraped) are better than none.
        # ConnectionResetError after 30+ min of scraping shouldn't discard earlier data.
        continue-on-error: true

      - name: Commit and push data updates to main
        id: commit
        if: always()
        run: |
          git add data/ output/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-patrol: update data $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main || { echo "::error::git push failed — data will be lost"; exit 1; }
            echo "data_committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit"
            echo "data_committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy reports to gh-pages
        if: always() && steps.patrol.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect public HTML files (exclude confidential)
          mkdir -p /tmp/deploy-reports
          count=0
          for f in output/*.html; do
            [ ! -f "$f" ] && continue
            fname=$(basename "$f")
            [ "$fname" = "portfolio_dashboard.html" ] && continue
            cp "$f" "/tmp/deploy-reports/$fname"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          echo "Prepared $count HTML files for deploy"

          # Clone gh-pages into separate directory (avoids merge conflicts entirely)
          git clone --single-branch --branch gh-pages --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages-deploy
          cd /tmp/gh-pages-deploy

          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

          # Replace all HTML with fresh copies
          rm -f *.html
          cp /tmp/deploy-reports/*.html ./

          git add *.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy reports $(date +%Y-%m-%d)"
            git push origin gh-pages
            echo "gh-pages deployed successfully"
          else
            echo "No report changes to deploy"
          fi

      - name: Notify via Gmail
        if: always()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_ADDRESS: ${{ secrets.GMAIL_NOTIFY_ADDRESS }}
          DATA_COMMITTED: ${{ steps.commit.outputs.data_committed }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: https://ymatz28-beep.github.io/property-report/
        run: |
          python3 -c "
          import smtplib, json, os
          from email.mime.text import MIMEText
          from pathlib import Path
          from datetime import datetime

          committed = os.environ.get('DATA_COMMITTED', 'false') == 'true'
          run_url = os.environ['RUN_URL']
          report_url = os.environ['REPORT_URL']

          s = {}
          sp = Path('data/patrol_summary.json')
          if sp.exists():
              s = json.loads(sp.read_text())

          details = s.get('failure_details', [])
          failed_src = s.get('failed_sources', [])
          total = s.get('total', 0)
          new_count = s.get('new_count', 0)
          removed = s.get('removed_count', 0)
          step_count = s.get('step_count', 0)
          ok_count = s.get('ok_count', 0)
          elapsed = s.get('elapsed_min', 0)

          has_fail = bool(details or failed_src)

          if not committed:
              icon, status = '\u274c', '\u5931\u6557'
          elif has_fail:
              icon, status = '\u26a0\ufe0f', '\u90e8\u5206\u5931\u6557'
          else:
              icon, status = '\u2705', '\u5b8c\u4e86'

          NL = chr(10)
          L = []

          # --- Failed steps with human-readable details ---
          if details:
              fail_n = len(details)
              L.append(f'\u2501\u2501 \u5931\u6557 ({fail_n}/{step_count}\u30b9\u30c6\u30c3\u30d7) \u2501\u2501')
              for d in details:
                  label = d.get('label', d.get('step', '?'))
                  reason = d.get('reason', '\u4e0d\u660e')
                  impact = d.get('impact', '')
                  L.append(f'\u274c {label}')
                  L.append(f'   \u539f\u56e0: {reason}')
                  if impact:
                      L.append(f'   \u5f71\u97ff: {impact}')
                  if d.get('retried'):
                      L.append('   \u2192 \u30ea\u30c8\u30e9\u30a4\u6e08\u307f\u30fb\u518d\u5931\u6557')
                  tail = d.get('stderr_tail', '')
                  if tail:
                      last_line = tail.strip().split(NL)[-1][:80]
                      if last_line:
                          L.append(f'   \u8a73\u7d30: {last_line}')
                  L.append('')

          # --- Source failures ---
          if failed_src:
              L.append('\u2501\u2501 \u30bd\u30fc\u30b9\u969c\u5bb3 \u2501\u2501')
              for src in failed_src:
                  L.append(f'\u26a0\ufe0f {src}: \u30c7\u30fc\u30bf\u5927\u5e45\u6e1b\u5c11\uff08\u5dee\u5206\u304b\u3089\u9664\u5916\u6e08\uff09')
              L.append('')

          # --- What worked ---
          if ok_count > 0 and has_fail:
              L.append(f'\u2501\u2501 \u6b63\u5e38 ({ok_count}/{step_count}\u30b9\u30c6\u30c3\u30d7) \u2501\u2501')
              L.append(f'\u2705 \u4ed6{ok_count}\u30b9\u30c6\u30c3\u30d7\u306f\u6b63\u5e38\u5b8c\u4e86')
              L.append('')

          # --- Results ---
          L.append('\u2501\u2501 \u7d50\u679c \u2501\u2501')
          if committed:
              L.append(f'\u7dcf\u4ef6\u6570: {total}\u4ef6 / \u65b0\u898f: {new_count}\u4ef6 / \u6d88\u5931: {removed}\u4ef6')
              L.append(f'\u6240\u8981\u6642\u9593: {elapsed}\u5206')
              L.append(report_url)
          else:
              L.append('\u30c7\u30fc\u30bf\u66f4\u65b0\u306a\u3057\u300230\u5206\u5f8c\u306b\u81ea\u52d5\u30ea\u30c8\u30e9\u30a4\u4e88\u5b9a\u3002')

          if has_fail or not committed:
              L.append(f'\u30ed\u30b0: {run_url}')

          dt = datetime.now().strftime('%m/%d')
          subject = f'{icon} \u7269\u4ef6\u30d1\u30c8\u30ed\u30fc\u30eb{status} {dt}'
          body = NL.join(L)

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['GMAIL_NOTIFY_ADDRESS']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              smtp.send_message(msg)
          print(f'Sent: {subject}')
          print(body)
          "

  # Auto-retry: パトロール失敗+データcommitなし(完全失敗)の場合、30分後に再実行
  retry:
    needs: patrol
    if: always() && needs.patrol.outputs.patrol_failed == 'true' && needs.patrol.outputs.data_committed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes before retry
        run: sleep 1800

      - name: Trigger retry via workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run daily-patrol.yml --repo ${{ github.repository }}
