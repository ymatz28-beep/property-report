name: Daily Property Patrol

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: '1'

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      data_committed: ${{ steps.commit.outputs.data_committed }}
      patrol_failed: ${{ steps.patrol.outcome == 'failure' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git user
        run: |
          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

      - name: Run daily patrol
        id: patrol
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python run_daily_patrol.py
        timeout-minutes: 50
        # Partial results (some sites scraped) are better than none.
        # ConnectionResetError after 30+ min of scraping shouldn't discard earlier data.
        continue-on-error: true

      - name: Commit and push data updates to main
        id: commit
        if: always()
        run: |
          git add data/ output/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-patrol: update data $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main || { echo "::error::git push failed — data will be lost"; exit 1; }
            echo "data_committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit"
            echo "data_committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy reports to gh-pages
        if: always() && steps.patrol.outcome != 'skipped'
        run: |
          # Save output HTML before branch switch (exclude confidential files)
          mkdir -p /tmp/deploy-reports
          count=0
          for f in output/*.html; do
            [ ! -f "$f" ] && continue
            fname=$(basename "$f")
            [ "$fname" = "portfolio_dashboard.html" ] && continue
            cp "$f" "/tmp/deploy-reports/$fname"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          echo "Prepared $count HTML files for deploy"

          # Fetch and switch to gh-pages
          git fetch origin gh-pages:gh-pages
          git stash --include-untracked || true
          git checkout gh-pages

          # Clean up stale non-HTML artifacts that leaked into gh-pages
          for stale in __pycache__ .github lib data output; do
            [ -e "$stale" ] && git rm -rf "$stale" 2>/dev/null && echo "Removed stale: $stale"
          done

          # Copy saved reports (only HTML files — no __pycache__ etc.)
          cp /tmp/deploy-reports/*.html ./

          git add *.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy reports $(date +%Y-%m-%d)"
            git push origin gh-pages
            echo "gh-pages deployed successfully"
          else
            echo "No report changes to deploy"
          fi

      - name: Notify via Gmail
        if: always()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_NOTIFY_ADDRESS: ${{ secrets.GMAIL_NOTIFY_ADDRESS }}
          PATROL_OUTCOME: ${{ steps.patrol.outcome }}
          DATA_COMMITTED: ${{ steps.commit.outputs.data_committed }}
        run: |
          if [ "$PATROL_OUTCOME" = "success" ] && [ "$DATA_COMMITTED" = "true" ]; then
            ICON="✅"
            STATUS="完了"
            BODY="スクレイピング成功、データ更新+gh-pagesデプロイ済み。\nhttps://ymatz28-beep.github.io/property-report/"
          elif [ "$DATA_COMMITTED" = "true" ]; then
            ICON="⚠️"
            STATUS="部分成功"
            BODY="スクレイピングにエラーあり（部分データcommit済み）。\nGHAログを確認: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            ICON="❌"
            STATUS="失敗"
            BODY="データ更新なし。30分後に自動リトライ予定。\nGHAログ: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          SUBJECT="${ICON} 物件パトロール${STATUS} $(date +%m/%d)"
          export BODY SUBJECT
          python3 -c "
          import smtplib
          from email.mime.text import MIMEText
          import os
          msg = MIMEText(os.environ['BODY'], 'plain', 'utf-8')
          msg['Subject'] = os.environ['SUBJECT']
          msg['From'] = os.environ['GMAIL_ADDRESS']
          msg['To'] = os.environ['GMAIL_NOTIFY_ADDRESS']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_ADDRESS'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          print(f'Notification sent: {os.environ[\"SUBJECT\"]}')
          "

  # Auto-retry: パトロール失敗+データcommitなし(完全失敗)の場合、30分後に再実行
  retry:
    needs: patrol
    if: always() && needs.patrol.outputs.patrol_failed == 'true' && needs.patrol.outputs.data_committed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes before retry
        run: sleep 1800

      - name: Trigger retry via workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run daily-patrol.yml --repo ${{ github.repository }}
