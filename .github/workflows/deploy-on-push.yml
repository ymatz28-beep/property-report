name: Deploy to gh-pages on push

on:
  push:
    branches: [main]
    paths:
      - 'output/*.html'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy HTML to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/deploy-reports
          count=0
          for f in output/*.html; do
            [ ! -f "$f" ] && continue
            fname=$(basename "$f")
            [ "$fname" = "portfolio_dashboard.html" ] && continue
            cp "$f" "/tmp/deploy-reports/$fname"
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          echo "Deploying $count HTML files"

          git clone --single-branch --branch gh-pages --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages-deploy
          cd /tmp/gh-pages-deploy

          git config user.name "Property Report Bot"
          git config user.email "noreply@github.com"

          # gh-pages限定の手動保守ページ（property-analyzer側にソースが無い）は削除対象から除外
          MANUAL_PAGES="portfolio_dashboard.html portfolio.html minpaku-osaka-ittou.html yakuin-sell-or-rent.html"
          for f in *.html; do
            [ ! -f "$f" ] && continue
            skip=0
            for m in $MANUAL_PAGES; do
              [ "$f" = "$m" ] && skip=1 && break
            done
            [ "$skip" -eq 1 ] && continue
            rm -f "$f"
          done
          cp /tmp/deploy-reports/*.html ./

          git add -A -- '*.html'
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy from main $(date +%Y-%m-%d-%H%M)"
            git push origin gh-pages
            echo "gh-pages deployed"
          else
            echo "No changes to deploy"
          fi
