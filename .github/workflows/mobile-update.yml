name: Mobile Update

on:
  issues:
    types: [opened]

jobs:
  update:
    if: contains(github.event.issue.labels.*.name, 'update')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --dangerously-skip-permissions "
          以下のIssueの指示に従い、このリポジトリのファイルを編集してください。
          HANDOFF.mdがあれば読んで現状を把握してから編集。

          タイトル: ${{ github.event.issue.title }}
          本文:
          ${{ github.event.issue.body }}

          編集後、変更サマリを出力してください。
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            git add -A
            git commit -m "update: ${{ github.event.issue.title }}

          Triggered by #${{ github.event.issue.number }}
          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const noChanges = process.env.NO_CHANGES === 'true';
            const body = noChanges
              ? '変更対象が見つかりませんでした。'
              : '反映完了 ✅\n\n※ キャッシュがあるため Cmd+Shift+R でハードリロードしてください。';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
            if (!noChanges) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, state: 'closed'
              });
            }
