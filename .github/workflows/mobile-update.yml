name: Mobile Update

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  update:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'update')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          prompt: |
            以下のIssueの指示に従い、このリポジトリのファイルを編集してください。
            ※ 現在gh-pagesブランチをチェックアウトしています。
            HANDOFF.mdがあれば読んで現状を把握してから編集。

            タイトル: ${{ github.event.issue.title }}
            本文:
            ${{ github.event.issue.body }}

            - 変更がなければその旨コメント
            - 変更があれば完了後にIssueをcloseする
