  approach_options:
    - title: A. まず「賃貸投資区分」として打診（推奨・ハードル最小）
      detail: 不動産投資ローンの土俵に乗れて旅館業許可が不要。打診の間口が一気に広がる。融資の感触・条件をここで取る。
      caveat: ★賃貸用途で借りて実際に民泊運用すると資金使途違反・契約違反で一括返済リスク（規約面は民泊可と確認済みだが、融資契約上の用途は別）。最終的にどちらで実行するか決め、実行先には実態を正しく伝える。
