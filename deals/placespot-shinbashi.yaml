  existing_track_record: 筑波銀行（セゾン保証）で全国の物件に融資実績あり（2.40-2.85%/15年、滞納ゼロ）。ただし筑波は方針変更で現在「福岡の物件には融資しない」→今回は使えない。
  saison_is_guarantor: true         # ★セゾンファンデックスは「保証会社」。貸すのは提携銀行。セゾン保証が付く"銀行"を探すのが軸
  headline: 低金利優先。本命は公庫（旅館業）＝ただし組合加入→振興事業貸付で設備20年返済を取るのが成立条件。法人名義なら滋賀は使えず（法人NG）、法人OKの代替はセゾン直接(3.4-5.2%)。金利の低い順に上から打診し、高金利ノンバンクは最終手段。
  # ★★ 2026-06-05 一次ソース裏取りで判明した、戦略を左右する2つの事実 ★★
  verified_2026_06_05:
    - id: jfc_term_requires_kumiai
      finding: 公庫・生活衛生貸付は「一般貸付=設備13年以内」「振興事業貸付（生活衛生同業組合 加入が条件）=設備20年以内（据置2年）」。20年返済は組合ルート限定。金利引下げは会計書類＋事業計画確認で−0.15%、生産性向上計画なら−0.30%。
      impact: 借入2,340万・金利2.0%で月返済は 13年≒17.0万 / 20年≒11.8万。軌道65%の営業利益16.4万に対しDSCRは 13年=0.96(赤字) / 20年=1.39。→組合加入→振興事業貸付(20年)が公庫成立の必須条件。一般貸付(13年)では回らない。詳細は deals/financing/10_生活衛生同業組合_公庫低利の鍵.md
      source: https://www.jfc.go.jp/n/finance/search/32_ippankashitsuke_m.html
    - id: shiga_kojin_only
      finding: 滋賀銀行ジャストサポートは個人向け専用で法人名義の不動産は担保不可。収益物件目的は「給与収入>不動産収入」かつ不動産賃貸業が主業の人は不可、4,999万以下は前年給与800万以上が条件。現行金利は2.600/3.225/4.375/5.525%(2026-04)、3,000万以上で最優遇2.500%（1.95%は旧情報）。
      impact: iUMA法人名義では使えない。滋賀を使うなら手嶋耕一 個人名義（給与所得者・給与>不動産収入を満たす前提）に組替えが必要。法人で通すなら滋賀は外し、法人OKのセゾン直接(変動3.4-5.2%/2026-05・固定4.5-9.9%・5億・5-25年)へ差し替え。
      source: https://mcl.sbk.jp/lp/fudosantanpo/
  # ★金利の低い順の打診ラダー（これを上から順に当てる。2026-06-05 裏取り反映）
  rate_order:
    - rank: 1
      name: 日本政策金融公庫 振興事業貸付（旅館業・要・生活衛生同業組合 加入）
