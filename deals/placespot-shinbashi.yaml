# --- 補助金・税優遇（専門チーム4レーン調査 2026-06-05。詳細は deals/financing/05_補助金_使えるもの全部.md）---
# ★大原則: ほぼ全部「旅館業（簡易宿所）許可」が前提で「賃貸のまま」だと全滅。許可1手で融資(公庫/商工中金)と補助金が同時に開く。
# ★順序の罠: 交付決定/計画認定の"前"に発注・取得すると対象外。★後払い: つなぎ資金が要る。
subsidies:
  headline: 旅館業許可がスイッチ。堅い着地は現金・節税で100万前後（福岡市40万＋省力化補助 数十万＋税制の実効 数十万）。1室区分で「上限1000万」は非現実。
  prerequisite_permit: 旅館業（簡易宿所）許可。民泊（住宅宿泊事業法）は省力化補助等で対象外。
  recommended_stack:
    - id: A_ryokan_permit
      name: 旅館業許可を取る（全補助・全低利融資の前提）
      cost: 無料〜数万（申請中でも公庫打診可）
      status: 最優先
    - id: B_fukuoka_city
      name: 福岡市 宿泊事業者受入環境充実支援補助金
      benefit: 補助1/2・上限40万は「1事業者あたり」（市回答2026-06-09。複数施設でも旅館業合計29室以下なら法人全体で40万が天井）。スマートロック/セルフチェックイン/多言語/Wi-Fi/防災が対象。リノベ本体・消防・家具家電は対象外。★区分マンション1室はQ&A問13でマンションタイプの客室内キッチン・洗濯設備が原則対象外
      window: 2026年度 5/13〜11/30受付中・完了2027/2/28・交付決定前発注NG・予算上限で早期終了。来年度(2027)は未定（市回答）。申請→交付決定 約1ヶ月
      need: 旅館業許可＋宿泊税申告＋★申請時点で実際に営業していること（市が運営状況を確認）。窓口 syukuhaku-shien@city.fukuoka.lg.jp（観光産業課 横尾氏）
      confidence: 高（2026-06-09 市から正式回答で裏取り。チラシ/Q&A/事例集の3点入手済）
      source: https://www.city.fukuoka.lg.jp/keizai/kankou-s/ukeireshien_1.html
    - id: C_shoryokuka
      name: 中小企業省力化投資補助金（観光地・観光産業の宿泊枠）
      benefit: 補助1/2。自動チェックイン/スマートロック/PMS/防犯。1室の現実値は数十万（上限1000万は大型施設の話）
      need: 旅館業許可＋gBizIDプライム。民泊は対象外。後払い
      caveat: 公募時期・締切は流動的（制度統合中）→2026年度の公募要領を要確認
      confidence: 中（金額・時期は要確認）
      source: https://www.mlit.go.jp/kankocho/kobo06_00042.html
    - id: D_kyoka_zeisei
      name: 中小企業経営強化税制＋少額減価償却特例（補助金でないが実効が堅い）
      benefit: 設備190万を即時償却 or 10%税額控除(約19万)。40万未満は少額特例で全額経費（年300万枠）
      need: 経営力向上計画の認定を"設備取得の前"に＋旅館業の事業実態＋青色申告。期限2027/3/31
      confidence: 高
      source: https://www.chusho.meti.go.jp/keiei/kyoka/kyoka_zeisei.html
  secondary:  # 条件次第・無理に狙わない
    - 小規模事業者持続化補助金（上限50-250万・採択率約60%・商工会議所伴走必須・賃貸/従業員要件のリスク）
    - 先端設備等導入計画→固定資産税3年1/2（効果小・賃上げ表明が要件・他補助の加点下地にはなる）
    - 観光庁 宿泊施設インバウンド対応支援（2026公募未発表・3-4月監視 https://shukuhaku-inbound.go.jp/）
    - 宿泊施設サステナビリティ強化支援（省エネ1/2上限1000万・令和7で終了、2026継続未定）
    - キャリアアップ助成金（正社員化1人40-60万・将来スタッフ雇用時）
  excluded:  # 調査の上で除外（理由付き）
    - 国の省エネ大型補助(みらいエコ住宅2026/先進的窓リノベ2026/給湯省エネ2026)=居住用限定で事業用宿泊は対象外
    - 福岡県 宿泊生産性向上補助=政令市(福岡市)除外で対象外
    - 中小企業新事業進出補助金=申請時 従業員1名以上必須(従業員0は不可)・民泊対象外
    - 中小企業成長加速化補助金=売上100億志向で規模不一致
    - 消防設備・許認可代行費=どの補助でも対象外（法的必須工事）
  combine_rules:
    - 補助金で買った設備は減価償却の対象から外す（二重控除不可。補助分と自己資金分を分けて記帳）
    - 経営強化税制と投資促進税制は同一設備に併用不可（経営強化税制の方が得）
    - 計画認定・交付決定の"前"に発注しない。リノベ/設備の発注を許可・認定・交付決定の後ろに合わせる
    - 補助金は後払い。融資(公庫/セゾン直接)で立替→補助金で回収
  next_actions:
    - 福岡市保健所で簡易宿所許可の事前相談（鍵）
    - 福岡市観光部に受入環境補助の相談＋宿泊税申告の段取り
    - 福岡市の認定支援機関(商工会議所)で経営力向上計画を相談（発注の前に認定）
    - gBizIDプライム取得（省力化補助に必須・発行に日数）
    - 省力化/観光庁インバウンド補助の2026年度公募要領を毎月チェック
  note: 公開情報の一般情報であり個別の税務・行政判断ではない。金額・時期に『要確認』は申請前に一次窓口で最新を取る。

# --- 判断の閾値（化ける/見送りの基準線） ---
thresholds:
  target_ccr_pct: 10.0              # 自己資金配当率の目標（これ以上で「化ける」）
  min_acceptable_ccr_pct: 5.0       # 最低許容ライン
  payback_years_good: 10            # 自己資金回収 これ以下が良
