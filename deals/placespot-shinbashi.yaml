# ============================================================
# Deal Underwriting SSoT — プレイスポットしんばしビル
# ------------------------------------------------------------
# 1物件を深掘りして投資判断するための単一物件データ。
# 今後の物件は このファイルを複製して値を差し替えるだけで
# build_deal_cockpit.py が対話型シミュレーターHTMLを再生成する。
# スキーマ詳細 → deals/_schema.md
# ============================================================

deal:
  id: placespot-shinbashi
  url_slug: placespot              # 配信URL: iuma-private.pages.dev/property/placespot/
  extra_pages:                     # /property/<slug>/ に同梱する追加ページ（dest: output/内のsource）
    yakuin.html: yakuin-sell-or-rent.html   # 薬院 売る/貸す 試算（しんばし移動の判断材料）
  name: プレイスポットしんばしビル本館
  address: 福岡県福岡市博多区中洲2-1-11 プレイスポットしんばしビル本館 905号  # 905号(Yuma確認＋マイソクf-takken 99758573タイトル「プレイスポットしんばしビル本館 905」で裏取り 2026-06-09)。★競合注意: 905号は2026年5月に既に別の者が消防署へ旅館業の相談を入れていた（悠々ホーム中野氏経由で判明 2026-06-09）→同じく旅館業を狙う検討者がいる可能性が高い。一方で消防署からは「905号1室なら延べ面積の10%未満でみなし従属として許可できる」と確認取得済
  area_sqm: 49.23                     # 施工提案図(悠悠ホーム既存図)の値。★マイソク(f-takken)は内法40.63㎡で約8.6㎡相違→登記簿で確定要。簡易宿所基準(5名×3.3=16.5㎡)はどちらでもクリア
  area_sqm_uchinori_myso: 40.63       # マイソク掲載の専有面積(内法)。登記はこちらの可能性大→事業計画/申請書の面積はこれで見直す
  layout: 1DK+和室（DK 9.6帖 / 和室 7.2帖）  # マイソク表記: 1DK(DK8/和6)
  max_guests: 5
  area_note: 中洲（観光・宿泊需要が極めて強い福岡の一等地）。区分1ユニット。9階/最上階・SRC築51年(1975/2)・駐車場無・櫛田神社前2分。
  property_facts_verified:            # マイソク確認済(f-takken 99758573・2026-05-12・専任媒介 株ハピネス 092-833-7500)
    floor: 9階/地上9地下2・最上階
    structure: SRC
    built: 1975年2月（築51年）
    management: 自主管理。管理組合・修繕積立金 無し（新橋興産が管理・管理費12,675円）
    parking: 無
    zoning: 商業地域
    station: 七隈線 櫛田神社前 徒歩2分／空港線 中洲川端 徒歩7分
    use: ペット相談可・事務所使用可（民泊需要を訴求）。現況 空家
  is_minpaku_special_zone: false   # 福岡市は特区民泊エリアではない → 民泊新法180日上限が効く
  minpaku_ryokan_confirmed: true   # ★物件として民泊・旅館業が可能と確認済み（管理規約/用途の障壁クリア・Yuma確認 2026-06-04）
  source_docs:
    - 改装工事 御見積書 (悠悠ホーム MT06529, 2026/05/24)
    - 改装工事 ご提案書 / デザインイメージ (モダンジャパニーズ民泊リノベ)
    - 中洲2丁目物件 収支計画表 民泊 (F-area, 2026/05/17)
    - 中洲2丁目物件 収支計画表 旅館業 (F-area, 2026/05/17)
    - 中洲2丁目物件 御見積書 (F-area 初期費用, 2026/05/18)

# --- 取得・初期投資（円） ---
acquisition:
  asking_price_yen: 22490000        # マイソク(f-takken 99758573)掲載 2,249万・2026-05-12。指値2,000万を狙う。スライダーで可変
  acquisition_cost_rate: 0.07       # 取得諸費用率（仲介+登記+不取得税+印紙+司書）property-analyzer既定と統一
  renovation_yen: 7260000           # 改装工事 税込（悠悠ホーム見積 7,260,000）
  minpaku_setup_yen: 1903990        # 民泊/旅館 セットアップ（家具家電/スマートロック/許認可代行/消防 等 F-area見積）
  renovation_note: フルリノベ（解体〜内装〜住設）。49.23㎡=14.9坪の全面改装。
  setup_note: 民泊・旅館のみ必要。賃貸は不要（needs_setup=false）。

# --- 融資前提（property-analyzer revenue_calc.py 既定と統一） ---
financing:
  down_payment_ratio: 0.20          # 頭金/自己資金比率（総事業費に対して）
  loan_rate_annual: 0.0285          # 金利 年2.85%（筑波銀行 中洲/博多 実績レンジ）
  loan_years: 25                    # 返済年数

# --- 運用シナリオ別前提 ---
# 民泊・旅館の数値はF-area収支計画表から逆算（変動経費率は売上比で実測）
scenarios:
  rental:                           # 賃貸（業者提示なし → 当方推計）
    label: 賃貸（長期）
    is_estimate: true               # ★推計フラグ：実賃料は要確認
    monthly_rent_yen: 132000        # 49㎡リノベ済1LDK相当 @中洲/博多区中心 ㎡2,700円想定
    vacancy_rate: 0.05              # 空室率5%
    pm_fee_rate: 0.05               # 賃貸管理委託料5%
    fixed_annual_yen: 200000        # 固都税+保険+修繕（年額概算）
    needs_setup: false
    rent_psm_note: 132,000 ÷ 49.23㎡ ≈ 2,681円/㎡。中洲・祇園エリアのリノベ済1LDK相場想定。

  minpaku:                          # 民泊（住宅宿泊事業法・180日上限）
    label: 民泊（新法・180日上限）
    is_estimate: false
    adr_yen: 36600                  # 平均宿泊単価（民泊計画 平均36,627から）
    occupancy: 0.80                 # 業者想定 年平均80%（スライダー初期値）
    legal_day_cap: 180              # ★民泊新法の年間営業上限。福岡市は特区外
    var_opex_rate: 0.491            # 変動経費率（運営18+OTA15+清掃+消耗+光熱+宿泊税+修繕+決済）実測5,275,303/10,744,370
    fixed_annual_yen: 142800        # 固定費（管理/タブレット/ロック/ネット/申請代行）11,900×12
    needs_setup: true
    cap_note: 業者計画は80%×365≒292泊で180日上限を超過。法的に純民泊は年180泊が上限のため、cap適用時は売上が約6割に縮小する。

  ryokan:                           # 旅館業（簡易宿所許可・日数上限なし）
    label: 旅館業（簡易宿所・上限なし）
    is_estimate: false
    adr_yen: 38400                  # 平均宿泊単価（旅館計画 平均38,386から）
    occupancy: 0.50                 # 業者想定 年平均50%（スライダー初期値）
    legal_day_cap: 365              # 簡易宿所許可は日数上限なし
    var_opex_rate: 0.484            # 実測3,412,188/7,048,875
    fixed_annual_yen: 142800
    needs_setup: true
    cap_note: 簡易宿所許可で通年営業可。消防設備・許認可コストはセットアップ費に含む。中洲は旅館業の実需が厚い。

# --- 薬院物件（現拠点）の比較枠：数値は後で投入（プレースホルダー） ---
# 「賃貸に出す」「売却して自分が移動」「現状維持」を並べて意思決定するための器。
yakuin:
  enabled: true
  status: decided_rent              # 方針確定: 売らず「貸す」。R不動産/goodroom経由で14〜15万狙い
  decision: 貸す                     # 2026-06-05 Yuma確定。事務所利用OK
  current_value_yen: null           # 売却はしない前提（参考: 取得1,540万）
  remaining_loan_yen: 15400000      # 筑波銀行（セゾン保証）松戸支店 残債確定 2026-06-23 / 月105,242円・2.85%・15年
  monthly_rent_if_let_yen: 140000   # 市場相場 14〜15万のうち手堅い14万を採用。査定確定後に上書き
  rent_range_yen: [140000, 150000]  # R不動産/goodroom経由・事務所可で射程。普通チェーンだと11万に落ちる
  rent_basis: |
    同建物別室1LDK=12万募集中／R不動産インダストリアル64㎡=14.6万／goodroom薬院50.8㎡=15万・47㎡=14.1万。
    904は駅近(薬院大通3分)・広い(55㎡)・事務所可で上記コンプ以上の条件。旧借主価格11万(12万からの値切り)は市場非反映で除外。
  monthly_holding_cost_yen: null    # ローン返済 約10万 + 管理費修繕 2.54万 + 固都税(要実額) ≒ 月13万弱
  monthly_living_cost_now_yen: null # 今ここを自社事務所に使っている機会費用（移動時に別事務所が要る点に注意）
  note: |
    方針: 売らず貸す（2026-06-05確定）。客付け=福岡R不動産(濵田さん/NOKYD 092-401-6401、904を熟知)優先、
    並行でgoodroom。管理=集金代行3%に分離（14万×3%=月4,200円）。査定依頼文: _private/薬院_賃貸査定依頼_drafts.md。
    確定家賃が出たら monthly_rent_if_let_yen を上書き → しんばし投資との合算CFで最適パスを判定。

# --- 前提プリセット（業者前提 vs 独立リサーチ）。HTMLのボタンで一括切替 ---
# ★最重要論点: 業者ADR（民泊36,600/旅館38,400）は中洲の実勢ADR(12,000〜15,000)の2倍超。
#   ADR次第で投資判断が黒字↔赤字で反転するため、前提を切り替えて両にらみする。
presets:
  vendor:
    label: 業者想定（F-area収支計画表）
    minpaku: { occupancy: 0.80, adr_yen: 36600 }
    ryokan:  { occupancy: 0.50, adr_yen: 38400 }
    note: 業者提出のまま。ADRが実勢の2倍超で楽観的。上限ケースとして見る。
  research_base:
    label: リサーチ標準（2年目安定期）
    minpaku: { occupancy: 0.65, adr_yen: 20000 }
    ryokan:  { occupancy: 0.65, adr_yen: 18000 }
    note: 中洲実勢ADR12-15kに、5名定員49㎡のグループ割増を上乗せした標準値。福岡市ホテル稼働80%だが中洲民泊の立上げ・競争を割引き65%。
  research_cons:
    label: リサーチ保守（初年度・堅め）
    minpaku: { occupancy: 0.55, adr_yen: 15000 }
    ryokan:  { occupancy: 0.55, adr_yen: 14000 }
    note: 初年度・レビュー蓄積前。中洲実勢ADR下限+小割増。堅実に見たときの底。

# --- 旅館業（簡易宿所）許可：要件・初期コスト・必要経費・出典 ---
# 出典は2024-2026の福岡市公式/消防/行政書士/観光統計（専門リサーチ 2026-06-01）
licensing:
  recommended_scheme: ryokan_simple   # 中洲は民泊新法180日上限が重い→簡易宿所が本命
  schemes_compared:
    minpaku_law:
      label: 民泊新法（住宅宿泊事業）
      day_cap: 180
      permit: 届出制（審査約10日）
      front_desk: 不要（オンライン可）
      fire_req: 軽微（住警器・消火器程度）
      init_cost_yen: "数万〜数十万"
      risk: 180日超過で無許可営業=懲役6月/罰金100万
    ryokan_simple:
      label: 旅館業（簡易宿所営業）
      day_cap: 365
      permit: 許可制（保健所審査1〜3ヶ月）
      front_desk: 原則必須。ICT(タブレット+顔認証+10分駆付け+防犯カメラ)で代替可
      fire_req: 厳格（特定小規模自火報・誘導灯・消火器・消防法令適合通知書）
      init_cost_yen: "数十万〜数百万（建物による）"
      risk: 許可取消で営業0。構造/消防不適合だと許可下りず
    special_zone:
      label: 特区民泊
      available_fukuoka: false        # 福岡市は特区民泊を導入していない（北九州市は導入）
      note: 福岡市本体は不可。選択肢は民泊新法か旅館業の二択。
  requirements_ryokan:
    - 客室は内法で面積測定（設計図の通心寸法より小さくなる）
    - 玄関帳場は2㎡以上/天井1.8m以上 or ICT代替（厚労省H31通知で緩和）
    - 換気（毎時50%以上）・採光・給湯洗面・簡易水洗以上の便所・下水接続
    - 寝具の週1洗濯記録、宿泊者名簿3年保管
    - 用途変更は200㎡未満なら建築確認申請不要（49㎡は該当）。ただし適合義務は残る
    - 消防法令適合通知書が別途必須（建築確認不要でも消防は必要）
  # ★重要: 下の初期コストの一部(行政書士代行+申請手数料22,000/消防工事/防犯カメラ139,500)は
  #   既にF-areaセットアップ費190万に含まれる。二重計上を避けるため extra_only=true。
  init_cost_extra_yen: 400000          # セットアップ費に含まれない追加分の概算（行政書士追加・衛生改修・予備）
  init_cost_extra_note: 行政書士代行30-40万・衛生設備微修正・消防予備。F-area190万と重複する分は除外。
  detail_ref: deals/financing/08_旅館業_許可申請の詳細.md  # ★許可申請の流れ・要件・費用の詳細SSoT（2026-06-05 一次ソース裏取り）
  init_cost_breakdown_ref:             # 参考: 簡易宿所化の費目フルレンジ（リサーチ値・重複含む）。詳細は detail_ref
    消防設備工事: "150,000〜400,000（マンション全体設備接続が要ると数百万に増）"
    行政書士代行: "160,000〜400,000"
    保健所申請手数料: 22000            # ★福岡市公式（旅館業/簡易宿所とも22,000円・現金・返金不可）。旧16,500は誤り
    衛生設備微修正: "50,000〜200,000"
    ICTチェックイン設備: "200,000〜800,000（セットアップ費・補助金対象と重複注意）"
    用途変更_建築確認: "0（49㎡=200㎡未満で確認申請不要・適合義務は残る）"
  running_cost_extra_yen: 90000        # 年間：旅館業特有のランニング追加（消防点検）。光熱/清掃/宿泊税は既にscenario経費に算入済
  running_cost_extra_note: 消防設備法定点検 年4-7万（〜100㎡）+ 衛生備品。★旅館業許可は更新制ではない（更新費用なし。承継時のみ7,400円）。光熱・清掃・宿泊税・OTAは変動経費率に算入済のため二重計上しない。
  blockers:
    - title: 管理規約の民泊/宿泊使用 → ★クリア済み
      detail: 本物件は民泊・旅館業が可能と確認済み（2026-06-04）。区分で最大の障壁だった規約問題はクリア。
    - title: 区分1室の消防分類が建物全体に波及
      detail: 1室を宿泊用途にすると建物が(16)イ複合用途化。共用部の感知器追加や他住戸同意が要る場合あり。消防署へ事前相談（無料）。
  sources:
    - 福岡市保健医療局「旅館業法に基づく許可申請及び運営の手引き」 https://www.city.fukuoka.lg.jp/hofuku/hokensho/kurashinoeisei/jigyosya/ryokan/ryokangyounoeigyounituite.html
    - 福岡市「宿泊税の概要」 https://www.city.fukuoka.lg.jp/zaisei/zeisei/life/syuku001.html
    - 観光庁 民泊制度ポータル（180日上限） https://www.mlit.go.jp/kankocho/minpaku/overview/minpaku/law1.html
    - 住宅宿泊事業法 e-Gov https://laws.e-gov.go.jp/law/429AC0000000065
    - 旅館業法 e-Gov https://laws.e-gov.go.jp/law/323AC0000000138
    - 福岡市住宅宿泊事業（特区民泊非採用の確認） https://www.city.fukuoka.lg.jp/lifeinformation/eisei-doubutsuaigo/jyutakusyukuhakujigyo.html
    - 日本防災屋「民泊の消防設備」 https://fdma.co.jp/minpaku-setsubi/

# --- リノベ見積もり精査（専門チーム 2026-06-04）---
renovation_review:
  quote_total_yen: 7260000           # 悠悠ホーム見積（税込）
  psm_yen: 134000                    # ㎡単価（税抜ベース概算）
  ptsubo_yen: 443000                 # 坪単価（税抜）
  style_note: 業者見積はモダンジャパニーズ（叩き台）。本命はインダストリアル（躯体現し・配管露出・塗装仕上げ）で、仕上げ材/隠蔽工事/造作を削れるため30-40%圧縮余地。福岡の相見積先=Proceed Design/RenoLIVING/はぴりの等（詳細は融資パッケージ）。
  verdict: 妥当〜やや安い（ぼったくりではない）
  verdict_detail: 坪44.3万は福岡の居住用フルリノベ標準グレード上限。49㎡フルリノベ相場650-1,100万に対し下限側。総額は適正だが用途最適化と1行の突出で削減余地。
  target_after_yen: 5500000          # 現実的な着地（堅め）
  target_aggressive_yen: 4750000     # 強気の着地
  reduction_levers:
    - title: 床材183.6万の単価が突出（最優先・要確認）
      detail: ㎡37,340円は朝日ウッドテックMRX実勢(㎡12,000-15,000)の2-2.5倍。施工費込みか業者に内訳要求。普及グレード代替で最大約100万減（単価根拠の確認後）。
      saving_yen: 1000000
      confidence: 要確認
    - title: 用途最適化（民泊/旅館は居住用フル仕様より削れる）
      detail: 畳新調15.7万は不要、造作は最小限、住設グレード適正化(Panasonic Sクラス→普及で値引率↑)。映え+耐久性重視に。
      saving_yen: 1250000
      confidence: 中
    - title: 相見積もり2-3社（福岡は競争市場・10-20%差）
      detail: 地場工務店/リノベ専門に同条件提示。＋福岡市「宿泊事業者受入環境充実補助」上限100万(スマートロック等)はセットアップ費に充当可。
      saving_yen: 800000
      confidence: 中
  note: 「217万まで下がる」は原価割れで非現実のため採用しない。堅めで550万前後を想定。
  sources:
    - くらしの福岡 リノベ費用 https://kurashi-fukuoka.jp/renovation-cost/
    - 朝日ウッドテック MRX https://www.woodtec.co.jp/products/lineup/flooring/livenatural/livenatural-mrx/
    - パナソニック Sクラス値引 https://www.ohtomi.com/panasonic/kitchen/s_class.html
