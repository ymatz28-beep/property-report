# --- ゼロベース稼働リサーチの要点（HTML注記用） ---
research:
  occupancy_basis: |
    業者の「旅館業=稼働50%」は法的上限ではない。365日×50%≒183泊がたまたま民泊新法の180日上限と近いだけで、
    簡易宿所許可なら日数無制限。50%は「初年度・レビュー蓄積前・運営代行の保守見積もり」の数字。
    2年目以降の安定期はもっと回せる余地がある。
  market_facts:
    - 福岡市のホテル平均稼働率は80.4%(2024)でコロナ前超え。インバウンド(中韓台)が牽引
    - 中洲の好立地民泊は実績で年60〜75%稼働
    - 中洲の実勢ADRは12,000〜15,000円/泊（繁忙期上振れ）。業者の36,600/38,400は2倍超で要再検証
    - 福岡はアジア圏の連休に需要連動。繁忙=GW/年末年始/桜/紅葉、閑散=1月後半/6月/9月
  adr_caveat: |
    実勢ADR12-15kは1〜2名のスタジオ中心の相場。本物件は49㎡・最大5名なのでグループ割増が乗り、
    標準18-20k・保守14-15k程度は狙える想定。ただしAirDNA等で中洲の5名定員コンプを実測して確定すべき（未確定）。
  sources:
    - 福岡市観光統計2025 https://www.city.fukuoka.lg.jp/keizai/marketing/shisei/documents/kankotoukei2025.pdf
    - フクリパ 福岡ホテル稼働 https://fukuoka-leapup.jp/biz/202506.55844
    - 民泊投資情報ナビ（中洲ADR/稼働） https://blog.sogoseisaku.jp/minpaku-fukuoka/
    - Beds24 福岡県民泊2024 https://co-reception.com/overview-of-vacation-rentals-2024-01-fukuoka/

