<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>物件レポート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --card: #1a1d27;
  --card-hover: #242836;
  --border: #2d3348;
  --border-light: #3d4460;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --blue: #3b82f6;
  --purple: #6366f1;
  --orange: #ff6b35;
  --green: #22c55e;
  --green-light: #4ade80;
  --red: #ef4444;
  --red-light: #f87171;
  --yellow: #eab308;
  --text: #e4e4e7;
  --text-secondary: #9ca3af;
  --text-muted: #7c8293;
  --text-decorative: #5f6678;
  --font-display: 'Inter', 'Noto Sans JP', sans-serif;
  --font-body: 'Inter', 'Noto Sans JP', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 16px;
  --bp-mobile: 640px;
  --bp-tablet: 768px;
  --bp-desktop: 1200px;
  --shadow-card: 0 4px 16px rgba(0,0,0,0.2);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.3);
  --focus-ring: 2px solid #6366f1;
  --focus-offset: 2px;
  --active-scale: 0.97;
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --skeleton-base: #1a1d27;
  --skeleton-shine: #242836;
  --gnav-height: 52px;
  --z-nav: 100;
  --z-subnav: 90;
  --z-modal: 200;
  --z-toast: 300;
  --fs-display: clamp(22px, 4vw, 36px);
  --fs-h1: clamp(20px, 2.5vw, 26px);
  --fs-h2: clamp(16px, 2vw, 22px);
  --fs-h3: clamp(14px, 1.8vw, 18px);
  --fs-body: 14px;
  --fs-small: 12px;
  --fs-xs: 10px;
      --surface-hover: rgba(255,255,255,0.065);
      --border-hover: rgba(255,255,255,0.18);
      --muted: #71717a;
      --dim: #3f3f46;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .atmosphere { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .atm-orb {
      position: absolute; border-radius: 50%; filter: blur(120px);
      opacity: 0; animation: orbPulse 8s ease-in-out infinite;
    }
    .atm-orb:nth-child(1) {
      width: 500px; height: 500px; top: -10%; left: -5%;
      background: radial-gradient(circle, rgba(59,158,255,0.1), transparent 70%);
    }
    .atm-orb:nth-child(2) {
      width: 400px; height: 400px; bottom: 10%; right: -10%;
      background: radial-gradient(circle, rgba(59,158,255,0.06), transparent 70%);
      animation-delay: 4s;
    }
    @keyframes orbPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    }

    .page { position: relative; z-index: 2; max-width: 960px; margin: 0 auto; padding: 0 32px; }

    .hub-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      opacity: 0; animation: reveal 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }
    .hub-header h1 {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
    }
    .hub-header p {
      font-size: 13px; color: var(--text-secondary); margin-top: 6px;
    }

    .reports { margin-top: 0; }

    .report-item {
      display: block; text-decoration: none; color: var(--text);
      position: relative; padding: 16px 0;
      border-bottom: 1px solid var(--border);
      transition: all 0.25s ease;
    }
    .report-item:hover { padding-left: 8px; }
    .report-item::after {
      content: ''; position: absolute; left: 0; bottom: -1px;
      width: 0; height: 1px; background: var(--accent);
      transition: width 0.4s ease;
    }
    .report-item:hover::after { width: 100%; }

    .report-row {
      display: grid; grid-template-columns: 28px 1fr auto; gap: 14px; align-items: center;
    }
    .report-ordinal {
      font-size: 13px; font-weight: 500; color: var(--muted);
      transition: color 0.25s;
    }
    .report-item:hover .report-ordinal { color: var(--accent); }

    .report-body { display: flex; flex-direction: column; gap: 4px; }
    .report-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--accent);
    }
    .report-title {
      font-size: 15px; font-weight: 600; line-height: 1.3;
      transition: color 0.25s;
    }
    .report-item:hover .report-title { color: var(--accent); }
    .report-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

    .report-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .report-tag {
      font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      color: var(--text-secondary); transition: all 0.2s;
    }
    .report-item:hover .report-tag { border-color: rgba(255,255,255,0.12); color: var(--text); }

    .report-arrow {
      align-self: center; width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); display: grid; place-items: center;
      font-size: 14px; color: var(--muted);
      transition: all 0.25s ease;
    }
    .report-item:hover .report-arrow {
      background: var(--accent); border-color: var(--accent);
      color: var(--bg); transform: translateX(3px);
    }

    .fi {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .fi.v { opacity: 1; transform: translateY(0); }

    footer {
      margin-top: 80px; padding: 32px 0 48px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; animation: reveal 0.8s ease 0.6s forwards;
    }
    .foot-left, .foot-right {
      font-size: 10px; color: var(--dim); letter-spacing: 0.04em;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .page { padding: 0 20px; }
      .hub-header { padding: 32px 0 20px; }
      .report-row { grid-template-columns: 24px 1fr; gap: 12px; }
      .report-arrow { display: none; }
      .report-item { padding: 14px 0; }
      footer { flex-direction: column; gap: 12px; align-items: flex-start; margin-top: 40px; }
    }

    @media (max-width: 375px) {
      .page { padding: 0 14px; }
      .hub-header { padding: 24px 0 16px; }
      .hub-header h1 { font-size: 18px; }
      .hub-header p { font-size: 11px; }
      .report-item { padding: 12px 0; }
      .report-title { font-size: 14px; }
      .report-desc { font-size: 11px; }
      .report-tag { font-size: 9px; padding: 2px 6px; }
      footer { margin-top: 32px; padding: 20px 0 24px; }
    }
/* ── Shared Gnav ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: rgba(22,24,31,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: sticky; top: 0; z-index: 100; font-family: 'Inter','Noto Sans JP',sans-serif;
}
.site-nav { display: flex; gap: 4px; }
.site-nav a {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5);
  text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: .15s;
}
.site-nav a:hover, .site-nav a[aria-current="page"] {
  background: rgba(255,255,255,0.065); color: #f5f5f7;
}
.nav-toggle { display: none; }
.nav-toggle-label { display: none; cursor: pointer; padding: 8px; }
.nav-toggle-label span,
.nav-toggle-label span::before,
.nav-toggle-label span::after {
  display: block; background: #f5f5f7; height: 2px; width: 20px;
  border-radius: 2px; position: relative; transition: .3s;
}
.nav-toggle-label span::before,
.nav-toggle-label span::after { content: ''; position: absolute; }
.nav-toggle-label span::before { top: -6px; }
.nav-toggle-label span::after { top: 6px; }
@media (max-width: 640px) {
  .nav-toggle-label { display: block; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .site-nav {
    display: none; flex-direction: column; gap: 0;
    position: absolute; top: 52px; left: 0; right: 0; z-index: 200;
    background: rgba(22,24,31,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 8px 0;
  }
  .site-nav a { padding: 12px 24px; border-radius: 0; font-size: 14px; }
  .nav-toggle:checked ~ .site-nav { display: flex; }
  .nav-toggle:checked ~ .nav-toggle-label span { background: transparent; }
  .nav-toggle:checked ~ .nav-toggle-label span::before { top: 0; transform: rotate(45deg); }
  .nav-toggle:checked ~ .nav-toggle-label span::after { top: 0; transform: rotate(-45deg); }
}
  </style>
  <style>
.gnav{position:sticky;top:52px;z-index:90;background:rgba(10,12,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);padding:0;font-family:'Inter','Noto Sans JP',sans-serif}
.gnav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:0;padding:0 16px;overflow-x:auto;white-space:nowrap}
.gnav a{display:inline-block;padding:8px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:.04em;transition:color .2s}
.gnav a:hover{color:#fff}
.gnav a.cur{color:#fff;border-bottom:2px solid #3b9eff}
@media(max-width:640px){.gnav a{padding:10px 10px;font-size:10px;min-height:44px;display:inline-flex;align-items:center}}
@media(max-width:375px){.gnav-inner{padding:0 8px}.gnav a{padding:10px 8px;font-size:9px}}
  </style>
</head>
<body>
<header class="site-header">
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">
  <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
  <nav class="site-nav">
    <a href="https://ymatz28-beep.github.io/report-dashboard/">Hub</a>
    <a href="https://ymatz28-beep.github.io/property-report/" aria-current="page">Property</a>
    <a href="https://ymatz28-beep.github.io/trip-planner/">Travel</a>
  </nav>
</header>
<div class="gnav"><div class="gnav-inner"><a href="index.html" class="cur">Hub</a><a href="market.html">Market</a><a href="naiken-analysis.html">内覧分析</a><a href="inquiry-messages.html">問い合わせ</a><a href="inquiry-pipeline.html">Pipeline</a></div></div>
  <div class="atmosphere"><div class="atm-orb"></div><div class="atm-orb"></div></div>
  <div class="grain"></div>
  <div class="page">
    <div class="hub-header">
      <h1>物件レポート</h1>
      <p>毎日自動巡回・スコアリング・レポート生成</p>
    </div>
    <div class="reports" id="reports"></div>

    <footer>
      <div class="foot-left">不動産レポート &mdash; 2026</div>
      <div class="foot-right">毎日自動更新</div>
    </footer>
  </div>

  <script>
    var REPORTS = [
      {
        label: "物件マーケット",
        title: "物件マーケット — 大阪・福岡・東京",
        desc: "大阪・福岡・東京の中古マンション候補をスコアリング。全都市横断で比較。",
        tags: ["大阪", "福岡", "東京", "スコアリング"],
        url: "market.html"
      },
      {
        label: "内覧分析",
        title: "内覧分析 — 扇町 & 天満橋",
        desc: "重要事項調査報告書の分析。管理規約・修繕計画・民泊可否の評価。",
        tags: ["管理規約", "修繕計画", "民泊可否"],
        url: "naiken-analysis.html"
      },
      {
        label: "問い合わせ",
        title: "問い合わせメッセージ",
        desc: "スコア上位物件への問い合わせ文面を自動生成。コピーボタン付きで即座に送信可能。",
        tags: ["内覧依頼", "管理規約確認", "ペット確認"],
        url: "inquiry-messages.html"
      }
    ];

    function pad(n) { return n < 10 ? "0" + n : "" + n; }

    function render() {
      var container = document.getElementById("reports");
      var items = [];

      REPORTS.forEach(function(r, i) {
        var el = document.createElement("a");
        el.href = r.url;
        el.className = "report-item fi";

        var tagsHtml = (r.tags || []).map(function(t) {
          return '<span class="report-tag">' + t + '</span>';
        }).join("");

        el.innerHTML =
          '<div class="report-row">' +
            '<div class="report-ordinal">' + pad(i + 1) + '</div>' +
            '<div class="report-body">' +
              '<div class="report-label">' + r.label + '</div>' +
              '<div class="report-title">' + r.title + '</div>' +
              '<div class="report-desc">' + r.desc + '</div>' +
              (tagsHtml ? '<div class="report-tags">' + tagsHtml + '</div>' : '') +
            '</div>' +
            '<div class="report-arrow">\u2192</div>' +
          '</div>';

        items.push(el);
        container.appendChild(el);
      });

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          items.forEach(function(el, i) {
            setTimeout(function() { el.classList.add("v"); }, 400 + i * 120);
          });
        });
      });
    }

    render();
  </script>
</body>
</html>
