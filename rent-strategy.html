<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --card: #1a1d27;
  --card-hover: #242836;
  --border: #2d3348;
  --border-light: #3d4460;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --blue: #3b82f6;
  --purple: #6366f1;
  --orange: #ff6b35;
  --green: #22c55e;
  --green-light: #4ade80;
  --red: #ef4444;
  --red-light: #f87171;
  --yellow: #eab308;
  --text: #e4e4e7;
  --text-secondary: #9ca3af;
  --text-muted: #7c8293;
  --text-decorative: #5f6678;
  --font-display: 'Inter', 'Noto Sans JP', sans-serif;
  --font-body: 'Inter', 'Noto Sans JP', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 16px;
  --bp-mobile: 640px;
  --bp-tablet: 768px;
  --bp-desktop: 1200px;
  --shadow-card: 0 4px 16px rgba(0,0,0,0.2);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.3);
  --focus-ring: 2px solid #6366f1;
  --focus-offset: 2px;
  --active-scale: 0.97;
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --skeleton-base: #1a1d27;
  --skeleton-shine: #242836;
  --gnav-height: 52px;
  --z-nav: 100;
  --z-subnav: 90;
  --z-modal: 200;
  --z-toast: 300;
  --fs-display: clamp(22px, 4vw, 36px);
  --fs-h1: clamp(20px, 2.5vw, 26px);
  --fs-h2: clamp(16px, 2vw, 22px);
  --fs-h3: clamp(14px, 1.8vw, 18px);
  --fs-body: 14px;
  --fs-small: 12px;
  --fs-xs: 10px;
}

/* === Reset === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; scroll-padding-top: calc(var(--gnav-height, 52px) + 60px); }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* === Utilities === */
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.container-narrow { max-width: 720px; margin: 0 auto; padding: 24px; }
.container-wide { max-width: 1280px; margin: 0 auto; padding: 24px; }
.hide-mobile { }  /* overridden at 640px */
.show-mobile { display: none; }
.pnl-positive { color: var(--green); }
.pnl-negative { color: var(--red); }

/* === Fluid Typography === */
.text-display { font-size: var(--fs-display); font-weight: 700; font-family: var(--font-display); line-height: 1.1; }
.text-h1 { font-size: var(--fs-h1); font-weight: 700; line-height: 1.2; }
.text-h2 { font-size: var(--fs-h2); font-weight: 700; line-height: 1.3; }
.text-h3 { font-size: var(--fs-h3); font-weight: 600; line-height: 1.4; }
.text-body { font-size: var(--fs-body); }
.text-small { font-size: var(--fs-small); }
.text-xs { font-size: var(--fs-xs); }
.text-mono { font-family: var(--font-mono); }

/* === Stat Grid (responsive auto-fit) === */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--space-4);
}

/* === Section Spacing === */
.section { padding: var(--space-8) 0; }
.section + .section { border-top: 1px solid var(--border); }

/* === Responsive grid === */
.responsive-grid { display: grid; gap: 16px; }
.responsive-grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
.responsive-grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

/* === Table Scroll Indicator === */
.table-scroll-wrap {
  position: relative;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.table-scroll-wrap::after {
  content: '→ scroll';
  position: absolute;
  right: 8px;
  top: 8px;
  font-size: 9px;
  color: var(--text-muted);
  background: var(--surface);
  padding: 2px 6px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.table-scroll-wrap.has-scroll::after { opacity: 1; }

/* === Focus States (WCAG 2.1 AA) === */
:focus-visible {
  outline: var(--focus-ring);
  outline-offset: var(--focus-offset);
}
button:focus-visible, a:focus-visible {
  outline: var(--focus-ring);
  outline-offset: var(--focus-offset);
}

/* === Interactive Elements === */
button, .btn, [role="button"] {
  transition: transform var(--transition-fast), background var(--transition-fast);
  cursor: pointer;
}
button:active, .btn:active, [role="button"]:active {
  transform: scale(var(--active-scale));
}

/* === Skeleton Loading === */
.skeleton {
  background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* === Trend Indicators === */
.trend-up { color: var(--green); }
.trend-up::before { content: '▲ '; font-size: 0.75em; }
.trend-down { color: var(--red); }
.trend-down::before { content: '▼ '; font-size: 0.75em; }
.trend-flat { color: var(--text-muted); }
.trend-flat::before { content: '— '; }

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: var(--space-16) var(--space-8);
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: var(--space-4); opacity: 0.3; }
.empty-state .empty-title { font-size: var(--fs-h3); font-weight: 600; margin-bottom: var(--space-2); color: var(--text-secondary); }
.empty-state .empty-desc { font-size: var(--fs-body); }

/* === Toast Notification === */
.toast {
  position: fixed; bottom: var(--space-6); right: var(--space-6);
  background: var(--surface2); color: var(--text);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-md); border: 1px solid var(--border);
  box-shadow: var(--shadow-hover);
  font-size: var(--fs-small);
  z-index: var(--z-toast);
  animation: slideInUp 0.3s ease;
}
@keyframes slideInUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* === Progress Ring (CSS conic-gradient) === */
.progress-ring {
  --progress: 0;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) calc(var(--progress) * 1%), var(--border) 0);
  display: flex; align-items: center; justify-content: center;
}
.progress-ring::after {
  content: '';
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg);
}

/* === Badge variants === */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: var(--fs-xs); font-weight: 600; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-muted { background: rgba(124,130,147,0.15); color: var(--text-muted); }

/* === Animations === */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Tablet (768px) ===== */
@media (max-width: 768px) {
  .responsive-grid.cols-2,
  .responsive-grid.cols-3 { grid-template-columns: 1fr; }
}

/* ===== Mobile (640px) ===== */
@media (max-width: 640px) {
  .container { padding: 12px; }
  .hide-mobile { display: none; }
  .show-mobile { display: block; }
  .stat-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-2);
  }
  .section { padding: var(--space-4) 0; }
}

/* ===== Extra small (380px) ===== */
@media (max-width: 380px) {
  .container { padding: 8px; }
  .stat-grid { grid-template-columns: 1fr; }
}

* { box-sizing: border-box; margin: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
.wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

/* Hero */
.hero {
  padding: 32px 0 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 32px;
}
.hero-label {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--yellow); background: rgba(250,204,21,0.1);
  border: 1px solid rgba(250,204,21,0.25);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
}
.hero h1 {
  font-size: clamp(20px, 3vw, 28px); font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; }

/* Section title */
.section-heading {
  font-size: 14px; font-weight: 800; margin: 32px 0 12px;
  padding-left: 12px; border-left: 3px solid var(--accent);
  color: var(--text);
}

/* Property table */
.prop-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 12px; }
.prop-table {
  width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px;
}
.prop-table th {
  text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,0.45); border-bottom: 1px solid rgba(255,255,255,0.08);
  white-space: nowrap;
}
.prop-table td {
  padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.prop-table tr:hover td { background: rgba(255,255,255,0.025); }
.prop-table a { color: var(--text); text-decoration: none; }
.prop-table a:hover { color: var(--accent); }

/* Badges */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 999px;
  font-size: 10px; font-weight: 700;
}
.badge-red { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.badge-yellow { background: rgba(250,204,21,0.15); color: var(--yellow); border: 1px solid rgba(250,204,21,0.3); }
.badge-green { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.badge-city { background: rgba(99,102,241,0.12); color: var(--accent); border: 1px solid rgba(99,102,241,0.25); font-size: 9px; padding: 1px 6px; }

/* Steps chip */
.steps-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-family: var(--font-mono, monospace);
  color: var(--green); white-space: nowrap;
}
.steps-chip span { color: rgba(255,255,255,0.3); }

/* Strategy cards */
.strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
.strategy-card {
  background: var(--card, rgba(255,255,255,0.04)); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.07); padding: 20px;
}
.strategy-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.strategy-priority {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; flex-shrink: 0;
}
.priority-1 { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.priority-2 { background: rgba(250,204,21,0.15); color: var(--yellow); border: 1px solid rgba(250,204,21,0.3); }
.priority-3 { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.strategy-title { font-size: 13px; font-weight: 800; }
.strategy-subtitle { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }
.strategy-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 11px; line-height: 1.5; }
.strategy-row-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); width: 64px; flex-shrink: 0; padding-top: 1px; }
.strategy-row-val { flex: 1; }
.strategy-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 12px 0; }
.risk-note { font-size: 10px; color: var(--red); background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.15); border-radius: 6px; padding: 6px 10px; margin-top: 8px; }

/* Letter section */
.letter-block { margin-bottom: 28px; }
.letter-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
}
.letter-title { font-size: 12px; font-weight: 800; }
.letter-type { font-size: 10px; color: rgba(255,255,255,0.45); }
.letter-body {
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 14px 16px; font-size: 11px; line-height: 1.8;
  white-space: pre-wrap; font-family: var(--font-body); color: rgba(255,255,255,0.8);
  position: relative;
}
.copy-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3);
  color: var(--accent); font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 6px; cursor: pointer;
  transition: background 0.15s; white-space: nowrap;
}
.copy-btn:hover { background: rgba(99,102,241,0.22); }
.copy-btn.copied { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--green); }

/* Property letter group */
.prop-letter-group {
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 16px; margin-bottom: 20px;
}
.prop-letter-name {
  font-size: 13px; font-weight: 800; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.prop-letter-meta { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 14px; }

/* Letter tabs */
.letter-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.letter-tab {
  padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 700;
  cursor: pointer; border: 1px solid transparent;
  color: rgba(255,255,255,0.4); background: transparent; transition: all 0.15s;
}
.letter-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
.letter-tab.active { color: var(--accent); border-color: rgba(99,102,241,0.3); background: rgba(99,102,241,0.08); }

/* Notes section */
.notes-card {
  background: rgba(250,204,21,0.05); border: 1px solid rgba(250,204,21,0.2);
  border-radius: 12px; padding: 20px; margin-bottom: 32px;
}
.notes-card h3 { font-size: 13px; font-weight: 800; color: var(--yellow); margin-bottom: 12px; }
.notes-list { list-style: none; padding: 0; }
.notes-list li {
  padding: 7px 0 7px 20px; position: relative;
  font-size: 11px; line-height: 1.6; border-bottom: 1px solid rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.8);
}
.notes-list li:last-child { border-bottom: none; }
.notes-list li::before { content: '⚠'; position: absolute; left: 0; color: var(--yellow); font-size: 10px; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.35); font-size: 13px; }

@media (max-width: 640px) {
  .strategy-grid { grid-template-columns: 1fr; }
  .wrap { padding: 16px 12px 48px; }
  .hero h1 { font-size: 20px; }
}
</style>

<script>
function switchLetter(btn, targetId) {
  const group = btn.closest('.prop-letter-group');
  group.querySelectorAll('.letter-block').forEach(el => el.style.display = 'none');
  group.querySelectorAll('.letter-tab').forEach(el => el.classList.remove('active'));
  document.getElementById(targetId).style.display = 'block';
  btn.classList.add('active');
}

function copyLetter(btn, textId) {
  const el = document.getElementById(textId);
  if (!el) return;
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ コピー済み';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback: select text
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}
</script>
